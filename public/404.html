<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sarah Broussard</title>
    <script>
      // GitHub Pages SPA redirect (rafgraph/spa-github-pages technique)
      // Redirects deep URL into root index.html with the path encoded as a query string
      var pathSegmentsToKeep = 1; // matches base /sarah-portfolio/
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
